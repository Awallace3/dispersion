name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
     - master
  release:
    types:
      - published

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Build SDist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v4
      with:
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: pypa/cibuildwheel@v2.21
      env:
        CIBW_ARCHS_MACOS: auto universal2
        CIBW_PRERELEASE_PYTHONS: "1"
        CIBW_BEFORE_ALL_LINUX: >-
          bash -lc "set -euxo pipefail &&
          if ! command -v curl >/dev/null 2>&1 && ! command -v wget >/dev/null 2>&1; then yum install -y curl; fi &&
          if command -v curl >/dev/null 2>&1; then curl -fsSL -o /tmp/miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh; else wget -qO /tmp/miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh; fi &&
          bash /tmp/miniconda.sh -b -p /opt/miniconda3 &&
          /opt/miniconda3/bin/conda env create -n cibw -f /project/environment.yml"
        CIBW_BEFORE_ALL_MACOS: >-
          bash -lc "set -euxo pipefail &&
          arch=$(uname -m) &&
          if [ \"$arch\" = \"arm64\" ]; then installer=https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-arm64.sh; else installer=https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-x86_64.sh; fi &&
          curl -fsSL -o /tmp/miniconda.sh \"$installer\" &&
          bash /tmp/miniconda.sh -b -p /Users/runner/miniconda3 &&
          /Users/runner/miniconda3/bin/conda env create -n cibw -f \"$GITHUB_WORKSPACE/environment.yml\""
        CIBW_BEFORE_ALL_WINDOWS: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "Invoke-WebRequest -Uri 'https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe' -OutFile C:\\miniconda.exe; Start-Process -FilePath C:\\miniconda.exe -ArgumentList '/InstallationType=JustMe','/RegisterPython=0','/S','/D=C:\\Miniconda3' -Wait; C:\\Miniconda3\\Scripts\\conda.exe env create -n cibw -f \"$env:GITHUB_WORKSPACE\\environment.yml\""
        CIBW_ENVIRONMENT_LINUX: >-
          PATH=/opt/miniconda3/envs/cibw/bin:/opt/miniconda3/bin:$PATH
          CMAKE_PREFIX_PATH=/opt/miniconda3/envs/cibw
          Eigen3_DIR=/opt/miniconda3/envs/cibw/share/eigen3/cmake
        CIBW_ENVIRONMENT_MACOS: >-
          PATH=/Users/runner/miniconda3/envs/cibw/bin:/Users/runner/miniconda3/bin:$PATH
          CMAKE_PREFIX_PATH=/Users/runner/miniconda3/envs/cibw
          Eigen3_DIR=/Users/runner/miniconda3/envs/cibw/share/eigen3/cmake
        CIBW_ENVIRONMENT_WINDOWS: >-
          PATH=C:\\Miniconda3\\envs\\cibw;C:\\Miniconda3\\envs\\cibw\\Library\\bin;C:\\Miniconda3\\Scripts;C:\\Miniconda3;%PATH%
          CMAKE_PREFIX_PATH=C:\\Miniconda3\\envs\\cibw
          Eigen3_DIR=C:\\Miniconda3\\envs\\cibw\\share\\eigen3\\cmake

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        path: wheelhouse/*.whl


  upload_all:
    name: Upload if release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - uses: actions/download-artifact@v4
      with:
        name: artifact
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.pypi_password }}
